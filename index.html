<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Database with Photo Upload & Edit</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f1f5f9; color: #1e293b; padding: 30px 15px; scroll-behavior: smooth; }
        .container { max-width: 1300px; margin: 0 auto; }
        
        /* Premium Header */
        header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 40px 20px; border-radius: 20px; margin-bottom: 40px; box-shadow: 0 10px 25px -5px rgba(15,23,42,0.15); color: white; text-align: center; position: relative; overflow: hidden; }
        header h1 { font-size: 36px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 10px; background: linear-gradient(to right, #ffffff, #cbd5e1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        header p { color: #94a3b8; font-size: 15px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .pulse-dot { display: inline-block; width: 8px; height: 8px; background-color: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; animation: pulse 2s infinite; }
        .counter-badge { display: inline-block; margin-top: 20px; background: rgba(255,255,255,0.05); backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1); padding: 6px 18px; border-radius: 30px; font-size: 13px; font-weight: 600; color: #38bdf8; }
        
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* Form Styling */
        .form-section { background: white; padding: 25px; border-radius: 16px; margin-bottom: 40px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border-left: 6px solid #10b981; transition: all 0.3s ease; }
        .form-section.editing-mode { border-left: 6px solid #f59e0b; background-color: #fffbeb; }
        .form-section h2 { margin-bottom: 20px; font-size: 20px; color: #0f172a; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px;}
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 5px; text-transform: uppercase; }
        .form-group input, .form-group select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; font-size: 14px; }
        .form-group input:focus, .form-group select:focus { border-color: #10b981; }
        .form-group input:disabled { background-color: #e2e8f0; cursor: not-allowed; }
        
        .form-group input[type="file"] { padding: 7px; background: #f8fafc; cursor: pointer; }

        .submit-btn { background: #10b981; color: white; border: none; padding: 12px 30px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .submit-btn:hover { background: #059669; }
        .submit-btn.edit-mode { background: #f59e0b; }
        .submit-btn.edit-mode:hover { background: #d97706; }
        
        .cancel-btn { background: #94a3b8; color: white; border: none; padding: 12px 30px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 15px; margin-left: 10px; display: none; }
        .cancel-btn:hover { background: #64748b; }

        /* Search Box */
        .search-box { max-width: 600px; margin: 0 auto 30px auto; }
        .search-box input { width: 100%; padding: 14px 25px; font-size: 16px; border: 2px solid #cbd5e1; border-radius: 50px; outline: none; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .search-box input:focus { border-color: #2563eb; }

        /* Grid Layout & Cards */
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: 16px; padding: 24px; text-align: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border-top: 6px solid #2563eb; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 3px solid #f1f5f9; background: #e2e8f0; }
        .card .id-badge { display: inline-block; background: #dbeafe; color: #1e40af; font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 20px; margin-bottom: 12px; }
        .card h3 { font-size: 18px; color: #0f172a; margin-bottom: 4px; }
        .card .designation { font-size: 13px; color: #64748b; font-weight: 600; text-transform: uppercase; margin-bottom: 15px; }
        .card .quick-info { text-align: left; background: #f8fafc; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; }
        
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .view-btn { flex: 1; min-width: 80px; background: #2563eb; color: white; border: none; padding: 8px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 13px; }
        .view-btn:hover { background: #1d4ed8; }
        .edit-btn { flex: 1; min-width: 80px; background: #f59e0b; color: white; border: none; padding: 8px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 13px; }
        .edit-btn:hover { background: #d97706; }
        .del-btn { flex: 1; min-width: 80px; background: #ef4444; color: white; border: none; padding: 8px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 13px; }
        .del-btn:hover { background: #dc2626; }

        /* Pagination */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 40px; margin-bottom: 20px; }
        .page-btn { background: #ffffff; border: 1px solid #cbd5e1; padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #pageInfo { font-weight: 600; color: #475569; }

        /* Popup Modal System */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 800px; border-radius: 16px; padding: 30px; max-height: 90vh; overflow-y: auto; position: relative; }
        .close-modal { position: absolute; top: 20px; right: 20px; font-size: 28px; cursor: pointer; color: #64748b; }
        .modal-header { display: flex; align-items: center; gap: 20px; border-bottom: 2px solid #f1f5f9; padding-bottom: 20px; margin-bottom: 20px; }
        .modal-avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; background: #e2e8f0; border: 3px solid #f1f5f9; }
        .modal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 20px; }
        .section-title { grid-column: 1 / -1; font-size: 15px; color: #2563eb; font-weight: 700; border-bottom: 1px dashed #cbd5e1; padding-bottom: 5px; margin-top: 10px; text-transform: uppercase; }
        .data-item { font-size: 14px; }
        .data-item strong { color: #475569; display: block; font-size: 12px; text-transform: uppercase; margin-bottom: 2px; }
        .data-item span { color: #0f172a; font-weight: 500; }
        .no-data { grid-column: 1/-1; text-align: center; color: #64748b; font-size: 18px; padding: 40px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Office Staff Database Portal</h1>
        <p><span class="pulse-dot"></span> Enterprise Big Data Management System</p>
        <div class="counter-badge">
            Total Registered Members: <span id="staffCounter" style="font-weight: 800; color: #ffffff;">0</span>
        </div>
    </header>

    <div class="form-section" id="formSection">
        <h2 id="formTitle">Register New Staff Profile</h2>
        <form id="staffForm" onsubmit="addNewStaff(event)">
            <div class="form-grid">
                <div class="form-group"><label>Staff ID</label><input type="text" id="s_id" placeholder="e.g. STF-1001" required></div>
                <div class="form-group"><label>Full Name</label><input type="text" id="s_name" placeholder="Full Name" required></div>
                <div class="form-group"><label>Designation</label><input type="text" id="s_design" placeholder="e.g. Account Executive" required></div>
                
                <div class="form-group"><label>Staff Photo</label><input type="file" id="s_photo" accept="image/*"></div>
                
                <div class="form-group">
                    <label>Category</label>
                    <select id="s_category">
                        <option value="Permanent">Permanent</option>
                        <option value="Probation">Probation</option>
                        <option value="Contractual">Contractual</option>
                    </select>
                </div>
                <div class="form-group"><label>Joining Date</label><input type="date" id="s_joinDate" required></div>
                <div class="form-group"><label>Office Contact</label><input type="text" id="s_offContact" placeholder="017XXXXXXXX"></div>
                <div class="form-group"><label>Personal Contact</label><input type="text" id="s_perContact" placeholder="01XXXXXXXXX" required></div>
                <div class="form-group"><label>NID Number</label><input type="text" id="s_nid" placeholder="National ID"></div>
                <div class="form-group"><label>Blood Group</label><input type="text" id="s_blood" placeholder="A+, B-, etc."></div>
                <div class="form-group"><label>Last Education</label><input type="text" id="s_edu" placeholder="Last Education"></div>
                <div class="form-group"><label>Marital Status</label><input type="text" id="s_marital" placeholder="Single / Married"></div>
                <div class="form-group"><label>Father's Name</label><input type="text" id="s_father"></div>
                <div class="form-group"><label>Mother's Name</label><input type="text" id="s_mother"></div>
                <div class="form-group"><label>Guardian Name</label><input type="text" id="s_guardian"></div>
                <div class="form-group"><label>Guardian Mobile</label><input type="text" id="s_gContact"></div>
                <div class="form-group"><label>Guardian Relation</label><input type="text" id="s_gRelation"></div>
            </div>
            
            <div class="form-grid">
                <div class="form-group" style="grid-column: span 2;"><label>Present Address (District, Thana, Details)</label><input type="text" id="s_presAddr" placeholder="District, Thana, Details" required></div>
                <div class="form-group" style="grid-column: span 2;"><label>Permanent Address (District, Thana, Details)</label><input type="text" id="s_permAddr" placeholder="District, Thana, Details" required></div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button type="submit" class="submit-btn" id="submitBtn">+ Save Staff Profile</button>
                <button type="button" class="cancel-btn" id="cancelBtn" onclick="cancelEdit()">Cancel Edit</button>
            </div>
        </form>
    </div>

    <div class="search-box">
        <input type="text" id="mainSearch" placeholder="Instant Search by Name, ID, Category or Address..." onkeyup="handleSearch()">
    </div>

    <div class="grid-layout" id="staffGrid">
        </div>

    <div class="pagination">
        <button class="page-btn" id="prevBtn" onclick="changePage(-1)">Previous</button>
        <span id="pageInfo">Page 1 of 1</span>
        <button class="page-btn" id="nextBtn" onclick="changePage(1)">Next</button>
    </div>
</div>

<div class="modal" id="profileModal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div id="modalDataContainer"></div>
    </div>
</div>

<script>
    // 1. Initialize Database
    let defaultData = {
        "STF-01": { id: "STF-01", name: "Md. Rakibul Islam", design: "Senior Executive", category: "Permanent", joinDate: "2024-01-12", offContact: "01711-XXXXXX", perContact: "01911-XXXXXX", nid: "1995XXXXXXXXX", blood: "B+", edu: "MBA", marital: "Married", father: "Md. Abul Kashem", mother: "Rokeya Begum", guardian: "Md. Abul Kashem", gContact: "01811-XXXXXX", gRelation: "Father", presAddr: "Dhaka, Mirpur", permAddr: "Bogura, Sherpur", photo: "" }
    };

    let staffDatabase = JSON.parse(localStorage.getItem('photoStaffData'));
    if (!staffDatabase || Object.keys(staffDatabase).length === 0) {
        staffDatabase = defaultData;
        localStorage.setItem('photoStaffData', JSON.stringify(staffDatabase));
    }

    let filteredKeys = [];
    let currentPage = 1;
    const cardsPerPage = 12;
    
    // State variables for Editing
    let isEditing = false;
    let currentEditId = null;

    window.onload = function() { initDatabase(); };

    function initDatabase() {
        filteredKeys = Object.keys(staffDatabase);
        updateCounter();
        renderPage();
    }

    function updateCounter() {
        document.getElementById('staffCounter').innerText = Object.keys(staffDatabase).length;
    }

    // 2. Process Image file & submit logic (Handles both NEW and EDIT)
    function addNewStaff(e) {
        e.preventDefault();
        const id = document.getElementById('s_id').value.trim().toUpperCase();
        
        // Prevent overwriting if adding a new profile
        if(!isEditing && staffDatabase[id]) {
            alert("This Staff ID already exists! Please use a unique ID.");
            return;
        }

        const photoFile = document.getElementById('s_photo').files[0];
        
        if (photoFile) {
            // New photo uploaded
            const reader = new FileReader();
            reader.onloadend = function() {
                saveDataStructure(id, reader.result);
            }
            reader.readAsDataURL(photoFile);
        } else {
            // No new photo. If editing, keep old photo. If new, save empty.
            const existingPhoto = isEditing ? staffDatabase[id].photo : "";
            saveDataStructure(id, existingPhoto);
        }
    }

    function saveDataStructure(id, imageBase64) {
        staffDatabase[id] = {
            id: id,
            name: document.getElementById('s_name').value,
            design: document.getElementById('s_design').value,
            category: document.getElementById('s_category').value,
            joinDate: document.getElementById('s_joinDate').value,
            offContact: document.getElementById('s_offContact').value || "N/A",
            perContact: document.getElementById('s_perContact').value,
            nid: document.getElementById('s_nid').value || "N/A",
            blood: document.getElementById('s_blood').value || "N/A",
            edu: document.getElementById('s_edu').value || "N/A",
            marital: document.getElementById('s_marital').value || "N/A",
            father: document.getElementById('s_father').value || "N/A",
            mother: document.getElementById('s_mother').value || "N/A",
            guardian: document.getElementById('s_guardian').value || "N/A",
            gContact: document.getElementById('s_gContact').value || "N/A",
            gRelation: document.getElementById('s_gRelation').value || "N/A",
            presAddr: document.getElementById('s_presAddr').value,
            permAddr: document.getElementById('s_permAddr').value,
            photo: imageBase64 
        };

        localStorage.setItem('photoStaffData', JSON.stringify(staffDatabase));
        
        if(isEditing) {
            alert("Profile Updated Successfully!");
            cancelEdit(); // Reset form state
        } else {
            alert("New Staff Added Successfully!");
            document.getElementById('staffForm').reset();
        }
        
        initDatabase(); 
    }

    // 3. EDIT Functionality
    function editStaff(id) {
        const staff = staffDatabase[id];
        if(!staff) return;

        isEditing = true;
        currentEditId = id;

        // Fill the form with existing data
        document.getElementById('s_id').value = staff.id;
        document.getElementById('s_id').disabled = true; // Cannot edit ID
        document.getElementById('s_name').value = staff.name;
        document.getElementById('s_design').value = staff.design;
        document.getElementById('s_category').value = staff.category;
        document.getElementById('s_joinDate').value = staff.joinDate;
        document.getElementById('s_offContact').value = staff.offContact !== "N/A" ? staff.offContact : "";
        document.getElementById('s_perContact').value = staff.perContact;
        document.getElementById('s_nid').value = staff.nid !== "N/A" ? staff.nid : "";
        document.getElementById('s_blood').value = staff.blood !== "N/A" ? staff.blood : "";
        document.getElementById('s_edu').value = staff.edu !== "N/A" ? staff.edu : "";
        document.getElementById('s_marital').value = staff.marital !== "N/A" ? staff.marital : "";
        document.getElementById('s_father').value = staff.father !== "N/A" ? staff.father : "";
        document.getElementById('s_mother').value = staff.mother !== "N/A" ? staff.mother : "";
        document.getElementById('s_guardian').value = staff.guardian !== "N/A" ? staff.guardian : "";
        document.getElementById('s_gContact').value = staff.gContact !== "N/A" ? staff.gContact : "";
        document.getElementById('s_gRelation').value = staff.gRelation !== "N/A" ? staff.gRelation : "";
        document.getElementById('s_presAddr').value = staff.presAddr;
        document.getElementById('s_permAddr').value = staff.permAddr;

        // Change UI to Edit Mode
        document.getElementById('formTitle').innerText = `Editing Profile: ${staff.name}`;
        document.getElementById('formSection').classList.add('editing-mode');
        
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.innerText = "🔄 Update Profile";
        submitBtn.classList.add('edit-mode');
        
        document.getElementById('cancelBtn').style.display = "block";

        // Scroll up to the form smoothly
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cancelEdit() {
        isEditing = false;
        currentEditId = null;
        
        document.getElementById('staffForm').reset();
        document.getElementById('s_id').disabled = false;
        
        // Restore normal UI
        document.getElementById('formTitle').innerText = "Register New Staff Profile";
        document.getElementById('formSection').classList.remove('editing-mode');
        
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.innerText = "+ Save Staff Profile";
        submitBtn.classList.remove('edit-mode');
        
        document.getElementById('cancelBtn').style.display = "none";
    }

    // 4. Search Logic
    function handleSearch() {
        const query = document.getElementById('mainSearch').value.toLowerCase();
        filteredKeys = Object.keys(staffDatabase).filter(key => {
            const staff = staffDatabase[key];
            const searchStr = `${staff.id} ${staff.name} ${staff.design} ${staff.category} ${staff.presAddr} ${staff.permAddr}`.toLowerCase();
            return searchStr.includes(query);
        });
        currentPage = 1;
        renderPage();
    }

    // 5. Render Grid Logic
    function renderPage() {
        const grid = document.getElementById('staffGrid');
        grid.innerHTML = '';
        
        if(filteredKeys.length === 0) {
            grid.innerHTML = '<div class="no-data" style="display:block;">No matching staff found!</div>';
            document.getElementById('pageInfo').innerText = `Page 0 of 0`;
            document.getElementById('prevBtn').disabled = true;
            document.getElementById('nextBtn').disabled = true;
            return;
        }

        const totalPages = Math.ceil(filteredKeys.length / cardsPerPage);
        const startIdx = (currentPage - 1) * cardsPerPage;
        const endIdx = startIdx + cardsPerPage;
        const pageKeys = filteredKeys.slice(startIdx, endIdx);

        pageKeys.forEach(key => {
            const staff = staffDatabase[key];
            const photoSrc = staff.photo ? staff.photo : 'https://via.placeholder.com/150/e2e8f0/64748b?text=No+Photo';
            
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${photoSrc}" class="avatar" alt="Profile">
                <div><span class="id-badge">ID: ${staff.id}</span></div>
                <h3>${staff.name}</h3>
                <div class="designation">${staff.design}</div>
                <div class="quick-info">
                    <div><strong>Contact:</strong> ${staff.offContact !== 'N/A' ? staff.offContact : staff.perContact}</div>
                    <div><strong>Category:</strong> ${staff.category}</div>
                </div>
                <div class="btn-group">
                    <button class="view-btn" onclick="openModal('${staff.id}')">View</button>
                    <button class="edit-btn" onclick="editStaff('${staff.id}')">Edit</button>
                    <button class="del-btn" onclick="deleteStaff('${staff.id}')">Delete</button>
                </div>
            `;
            grid.appendChild(card);
        });

        document.getElementById('pageInfo').innerText = `Page ${currentPage} of ${totalPages}`;
        document.getElementById('prevBtn').disabled = currentPage === 1;
        document.getElementById('nextBtn').disabled = currentPage === totalPages;
    }

    function changePage(dir) {
        currentPage += dir;
        renderPage();
    }

    function deleteStaff(id) {
        if(confirm(`Are you sure you want to delete ${id}?`)) {
            delete staffDatabase[id];
            localStorage.setItem('photoStaffData', JSON.stringify(staffDatabase));
            initDatabase();
        }
    }

    // 6. Modal Logic
    function openModal(staffId) {
        const staff = staffDatabase[staffId];
        if (!staff) return;

        const photoSrc = staff.photo ? staff.photo : 'https://via.placeholder.com/150/e2e8f0/64748b?text=No+Photo';

        const container = document.getElementById('modalDataContainer');
        container.innerHTML = `
            <div class="modal-header">
                <img src="${photoSrc}" class="modal-avatar" alt="Avatar">
                <div class="modal-title">
                    <h2>${staff.name}</h2>
                    <p style="color: #2563eb; font-weight: 600;">ID: ${staff.id} | ${staff.design}</p>
                </div>
            </div>
            <div class="modal-grid">
                <div class="section-title">Job & Identity Details</div>
                <div class="data-item"><strong>Employment Category</strong><span>${staff.category}</span></div>
                <div class="data-item"><strong>Joining Date</strong><span>${staff.joinDate}</span></div>
                <div class="data-item"><strong>NID Number</strong><span>${staff.nid}</span></div>
                <div class="data-item"><strong>Blood Group</strong><span>${staff.blood}</span></div>
                <div class="data-item"><strong>Last Education</strong><span>${staff.edu}</span></div>
                <div class="data-item"><strong>Marital Status</strong><span>${staff.marital}</span></div>

                <div class="section-title">Contact Information</div>
                <div class="data-item"><strong>Office Contact</strong><span>${staff.offContact}</span></div>
                <div class="data-item"><strong>Personal Contact</strong><span>${staff.perContact}</span></div>

                <div class="section-title">Family & Guardian Details</div>
                <div class="data-item"><strong>Father's Name</strong><span>${staff.father}</span></div>
                <div class="data-item"><strong>Mother's Name</strong><span>${staff.mother}</span></div>
                <div class="data-item"><strong>Guardian's Name</strong><span>${staff.guardian}</span></div>
                <div class="data-item"><strong>Guardian Contact</strong><span>${staff.gContact}</span></div>
                <div class="data-item"><strong>Relation with Guardian</strong><span>${staff.gRelation}</span></div>

                <div class="section-title">Present Address</div>
                <div class="data-item"><strong>Address Details</strong><span>${staff.presAddr}</span></div>

                <div class="section-title">Permanent Address</div>
                <div class="data-item"><strong>Address Details</strong><span>${staff.permAddr}</span></div>
            </div>
        `;
        document.getElementById('profileModal').style.display = "flex";
    }

    function closeModal() {
        document.getElementById('profileModal').style.display = "none";
    }

    // Close modal when clicking outside content box
    window.onclick = function(event) {
        let modal = document.getElementById('profileModal');
        if (event.target == modal) modal.style.display = "none";
    }
</script>

</body>
</html>
